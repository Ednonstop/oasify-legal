<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasify - Legal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 480px;
            padding: 40px 24px;
            text-align: center;
        }
        .logo {
            font-size: 64px;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 8px;
        }
        .tagline {
            font-size: 16px;
            color: #888;
            margin-bottom: 40px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .links a {
            display: block;
            padding: 16px 24px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            transition: background 0.2s, border-color 0.2s;
        }
        .links a:hover {
            background: #222;
            border-color: #555;
        }
        .footer {
            margin-top: 48px;
            font-size: 13px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🌿</div>
        <h1>Oasify</h1>
        <p class="tagline">Your plant care companion</p>
        <div class="links">
            <a href="privacy.html">Privacy Policy</a>
            <a href="terms.html">Terms of Service</a>
            <a href="support.html">Support</a>
        </div>
        <p class="footer">&copy; 2026 Eduard Koblyk. All rights reserved.</p>
    </div>
</body>
</html>
